<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - Krochet Kreations</title>
  <!-- Go up one folder to reach style.css -->
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <a href="index.html">
        <!-- Assets is outside Codes, so go up one folder -->
        <img src="../Assets/sitelogo.jpg" alt="Krochet Kreations Logo" class="logo">
      </a>
      <h1>Krochet Kreations</h1>
    </div>
    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="checkout.html">Checkout</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
      <div class="cart-link">
        <a href="cart.html">Your Cart🛒</a>
      </div>
    </nav>
  </header>

  <main>
    <h2>Checkout</h2>
    <form id="checkoutForm">
      <label for="name">Full Name:</label>
      <input type="text" id="name" required>

      <label for="address">Shipping Address:</label>
      <input type="text" id="address" required>

      <label for="payment">Amount Paid:</label>
      <input type="number" id="payment" required>

      <button type="submit">Confirm</button>
      <button type="reset">Cancel</button>
      <!-- Back to Cart button -->
      <button type="button" id="backToCart">Back to Cart</button>
    </form>

    <!-- Cart summary populated by JavaScript -->
    <section class="summary">
      <h3>Order Summary</h3>
      <table id="checkoutSummary">
        <!-- JavaScript will populate cart summary here -->
      </table>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Krochet Kreations</p>
  </footer>

  <!-- Go up one folder to reach script.js -->
  <script src="../script.js"></script>
  <script>
    // Back to Cart button functionality
    document.getElementById("backToCart")?.addEventListener("click", () => {
      window.location.href = "cart.html";
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart - Krochet Kreations</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    /* Extra cart-specific styling */
    #cartTable {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    #cartTable th, #cartTable td {
      border: 1px solid #ccc;
      padding: 0.5rem;
      text-align: center;
    }

    #cartTable th {
      background-color: #f5f5f5;
    }

    .cart-actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .cart-actions button {
      flex: 0 0 auto;
      padding: 0.5rem 1rem;
    }

    /* Optional: style for toast messages */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #333;
      color: #fff;
      padding: 10px 15px;
      border-radius: 6px;
      z-index: 9999;
      animation: fadein 0.3s, fadeout 0.3s 1.7s;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeout {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-container">
      <a href="../index.html">
        <img src="../Assets/sitelogo.jpg" alt="Krochet Kreations Logo" class="logo">
      </a>
      <h1>Krochet Kreations</h1>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="checkout.html">Checkout</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
      <div class="cart-link">
        <a href="cart.html">Your Cart 🛒</a>
      </div>
    </nav>
  </header>

  <main>
    <h2>Your Shopping Cart</h2>
    
    <table id="cartTable">
      <thead>
        <tr>
          <th>Action</th>
          <th>Item</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Subtotal</th>
        </tr>
      </thead>
    
      <tbody id="cartBody">
        <!-- JS will populate rows here -->
      </tbody>
    
      <tfoot>
        <tr>
          <td>Discount</td>
          <td colspan="4" id="discount">$0</td>
        </tr>
        <tr>
          <td>Tax</td>
          <td colspan="4" id="tax">$0</td>
        </tr>
        <tr>
          <td><strong>Total</strong></td>
          <td colspan="4" id="grandTotal"><strong>$0</strong></td>
        </tr>
      </tfoot>
    </table>
    
    <div class="cart-actions">
      <button id="clear">Clear All</button>
      <button id="continue">Continue Shopping</button>
      <button id="checkout">Checkout</button>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Krochet Kreations</p>
  </footer>

  <script src="../script.js"></script>
</body>
</html>
